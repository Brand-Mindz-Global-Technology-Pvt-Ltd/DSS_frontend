<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | DSS Delivery Services</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Manjari:wght@100;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/fashion-fetish" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#009444',
                        }
                    },
                    fontFamily: {
                        quicksand: ['Quicksand', 'sans-serif'],
                        fashion: ['Fashion Fetish', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                        manjari: ['Manjari', 'sans-serif'],
                    },
                    animation: {
                        'float-bird': 'float-bird 6s ease-in-out infinite',
                    },
                    keyframes: {
                        'float-bird': {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white overflow-x-hidden">

    <!-- Header Placeholder -->
    <div id="header-placeholder" class="fixed top-0 left-0 w-full z-[100]"></div>

    <!-- Contact Page Banner -->
    <section class="relative min-h-screen flex flex-col items-center justify-end overflow-hidden pb-12 sm:pb-8 pt-32 bg-[url('images/contact-banner.webp')] bg-cover bg-center">
        

        
        <!-- Bottom White Fade (Tailwind) -->
        <div class="absolute bottom-0 left-0 w-full h-[50%] bg-gradient-to-t from-white to-transparent pointer-events-none z-10"></div>

        <!-- Main Content Wrapper -->
        <div class="relative z-30 w-full max-w-7xl px-4 flex flex-col items-center text-center">

            <!-- 2. Big Heading (Fashion Fetish Font - Reduced Size) -->
            <h1 class="font-fashion text-3xl sm:text-5xl md:text-6xl lg:text-[4rem] font-bold text-[#111111] tracking-normal mb-6 sm:mb-4 leading-none selection:bg-brand-green/30">
                Get In <span class="text-brand-green">Touch With Us</span>
            </h1>

            <!-- 3. Reach Out Button (Quicksand Font - Reduced Size) -->
            <button
                class="bg-brand-green text-white px-6 sm:px-8 py-3 sm:py-3 rounded-full inline-flex items-center space-x-3 sm:space-x-4 hover:bg-green-700 transition-all transform hover:-translate-y-1 shadow-[0_15px_30px_rgba(0,148,68,0.25)] group font-quicksand">
                <span class="font-fashion text-lg sm:text-lg font-bold">Reach Out</span>
                <div class="flex items-center justify-center">
                    <img src="images/scooter-icon.png" alt="Scooter" class="w-8 h-auto sm:w-10 group-hover:translate-x-1 transition-transform">
                </div>
            </button>
        </div>
    </section>

    <!-- Contact Details & Form Section -->
    <section class="py-12 sm:py-12 bg-white">
        <div class="container mx-auto px-4 max-w-6xl">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
                
                <!-- Left Side: Contact Information (Middle Aligned) -->
                <div class="space-y-8 lg:pr-12">
                    <div class="space-y-4">
                        <h2 class="font-montserrat text-4xl sm:text-5xl text-[#111111] font-medium leading-none">Contact Us</h2>
                        <p class="font-manjari text-base sm:text-lg text-gray-600 max-w-md leading-relaxed">
                            We are committed to processing the information in order to contact you and talk about your project.
                        </p>
                    </div>

                    <div class="space-y-6 font-manjari">
                        <!-- Email -->
                        <div class="flex items-center space-x-4">
                            <div class="text-brand-green font-bold">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <a href="mailto:dss@gmail.com" class="text-lg font-bold text-gray-800 hover:text-brand-green transition-colors">dss@gmail.com</a>
                        </div>

                        <!-- Address -->
                        <div class="flex items-start space-x-4">
                            <div class="text-brand-green mt-1 font-bold">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                </svg>
                            </div>
                            <div class="text-lg font-bold text-gray-800 leading-snug">
                                4074 Ebert Summit Suite 375<br>
                                Tenkasi
                            </div>
                        </div>

                        <!-- Phone -->
                        <div class="flex items-center space-x-4">
                            <div class="text-brand-green font-bold">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                                </svg>
                            </div>
                            <a href="tel:+918756978235" class="text-lg font-bold text-gray-800 hover:text-brand-green transition-colors">+91 87569 78235</a>
                        </div>
                    </div>
                </div>

                <!-- Right Side: Contact Form (Bordered Placeholders) -->
                <div class="font-manjari bg-white">
                    <form action="#" class="space-y-4">
                        <!-- Name -->
                        <div class="border border-gray-200 rounded-md p-4 focus-within:border-brand-green transition-all">
                            <label for="name" class="text-sm font-bold text-gray-400 block mb-1">Name<span class="text-red-500 ml-1">*</span></label>
                            <input type="text" id="name" required class="w-full bg-transparent border-none p-0 text-gray-900 focus:ring-0 outline-none placeholder:text-transparent" placeholder="Name">
                        </div>

                        <!-- Email -->
                        <div class="border border-gray-200 rounded-md p-4 focus-within:border-brand-green transition-all">
                            <label for="email" class="text-sm font-bold text-gray-400 block mb-1">Email<span class="text-red-500 ml-1">*</span></label>
                            <input type="email" id="email" required class="w-full bg-transparent border-none p-0 text-gray-900 focus:ring-0 outline-none placeholder:text-transparent" placeholder="Email">
                        </div>

                        <!-- Website -->
                        <div class="border border-gray-200 rounded-md p-4 focus-within:border-brand-green transition-all">
                            <label for="website" class="text-sm font-bold text-gray-400 block mb-1">Website<span class="text-red-500 ml-1">*</span></label>
                            <input type="url" id="website" required class="w-full bg-transparent border-none p-0 text-gray-900 focus:ring-0 outline-none placeholder:text-transparent" placeholder="Website">
                        </div>

                        <!-- Message -->
                        <div class="border border-gray-200 rounded-md p-4 focus-within:border-brand-green transition-all">
                            <label for="message" class="text-sm font-bold text-gray-400 block mb-1">Message</label>
                            <textarea id="message" rows="4" class="w-full bg-transparent border-none p-0 text-gray-900 focus:ring-0 outline-none placeholder:text-transparent resize-none"></textarea>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="w-full pb-2 bg-brand-green text-white py-3 rounded-md text-xl font-bold hover:bg-green-700 transition-all transform active:scale-[0.99] shadow-none mt-2 font-manjari">
                            Submit
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </section>

    <!-- Map Section (Full Width) -->
    <section class="w-full h-[350px] sm:h-[500px] grayscale hover:grayscale-0 transition-all duration-1000 mb-12">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d31533.725895015!2d77.306!3d8.959!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b04299b66bb14c7%3A0xe5a3316e6f991f24!2sTenkasi%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1710323000000!5m2!1sen!2sin" 
            class="w-full h-full border-0" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
</body>
</html>
